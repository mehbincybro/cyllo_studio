<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky2)"/>
  <!-- Eiffel Tower simplified -->
  <g transform="translate(600, 250)">
    <!-- Base -->
    <polygon points="-80,400 80,400 40,200 -40,200" fill="#34495E" opacity="0.9"/>
    <polygon points="-40,200 40,200 20,50 -20,50" fill="#2C3E50" opacity="0.9"/>
    <polygon points="-20,50 20,50 10,-50 -10,-50" fill="#34495E" opacity="0.9"/>
    <circle cx="0" cy="-70" r="15" fill="#E74C3C"/>
    <!-- Levels -->
    <rect x="-60" y="320" width="120" height="8" fill="#E67E22" opacity="0.8"/>
    <rect x="-35" y="160" width="70" height="6" fill="#E67E22" opacity="0.8"/>
  </g>
  <!-- City silhouette -->
  <rect x="100" y="600" width="80" height="200" fill="#2C3E50" opacity="0.6"/>
  <rect x="250" y="620" width="100" height="180" fill="#34495E" opacity="0.6"/>
  <rect x="900" y="610" width="90" height="190" fill="#2C3E50" opacity="0.6"/>
  <rect x="1050" y="630" width="70" height="170" fill="#34495E" opacity="0.6"/>
  <!-- Text -->
  <text x="600" y="720" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">PARIS</text>
</svg>