<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky3)"/>
  <!-- Sun -->
  <circle cx="200" cy="150" r="70" fill="#FFF5E6" opacity="0.8"/>
  <!-- Ground -->
  <ellipse cx="600" cy="750" rx="800" ry="100" fill="#D68910" opacity="0.7"/>
  <ellipse cx="600" cy="700" rx="900" ry="80" fill="#CA6F1E" opacity="0.5"/>
  <!-- Acacia tree -->
  <g transform="translate(800, 400)">
    <rect x="-8" y="0" width="16" height="120" fill="#8B4513"/>
    <ellipse cx="0" cy="-30" rx="120" ry="50" fill="#27AE60" opacity="0.8"/>
    <ellipse cx="-40" cy="-20" rx="80" ry="40" fill="#229954" opacity="0.7"/>
    <ellipse cx="40" cy="-25" rx="90" ry="45" fill="#229954" opacity="0.7"/>
  </g>
  <!-- Animal silhouettes -->
  <g transform="translate(300, 550)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="#34495E"/>
    <ellipse cx="0" cy="-20" rx="30" ry="35" fill="#34495E"/>
    <rect x="-5" y="-40" width="10" height="30" fill="#34495E"/>
  </g>
  <!-- Text -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">SAFARI</text>
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="45" fill="white" text-anchor="middle" opacity="0.8">African Adventure</text>
</svg>