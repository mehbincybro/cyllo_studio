<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097E6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky4)"/>
  <!-- Ocean waves -->
  <path d="M 0,500 Q 300,480 600,500 T 1200,500 L 1200,800 L 0,800 Z" fill="#006BA6" opacity="0.6"/>
  <path d="M 0,550 Q 300,530 600,550 T 1200,550 L 1200,800 L 0,800 Z" fill="#005A8D" opacity="0.5"/>
  <!-- Island -->
  <ellipse cx="600" cy="650" rx="200" ry="60" fill="#F4E4C1"/>
  <!-- Palm tree on island -->
  <g transform="translate(550, 580)">
    <line x1="0" y1="0" x2="-5" y2="80" stroke="#8B4513" stroke-width="6"/>
    <ellipse cx="-8" cy="-10" rx="30" ry="20" fill="#2ECC71"/>
  </g>
  <!-- Boat -->
  <g transform="translate(300, 520)" opacity="0.7">
    <path d="M 0,0 L 60,0 L 50,20 L 10,20 Z" fill="#E74C3C"/>
    <line x1="30" y1="0" x2="30" y2="-40" stroke="#34495E" stroke-width="2"/>
    <polygon points="30,-40 60,-30 30,-20" fill="white"/>
  </g>
  <!-- Text -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">MALDIVES</text>
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle" opacity="0.8">Island Paradise</text>
</svg>