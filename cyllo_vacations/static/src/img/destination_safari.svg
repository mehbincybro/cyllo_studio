<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="safari_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#safari_sky)"/>
  
  <!-- Sun -->
  <circle cx="350" cy="200" r="120" fill="#FFF5E6" opacity="0.9"/>
  <circle cx="350" cy="200" r="160" fill="#FFE8CC" opacity="0.4"/>
  
  <!-- Mountains in distance -->
  <polygon points="0,600 300,400 600,600" fill="#8B7355" opacity="0.6"/>
  <polygon points="500,600 900,350 1300,600" fill="#7D6E5C" opacity="0.6"/>
  <polygon points="1200,600 1600,380 1920,600" fill="#8B7355" opacity="0.6"/>
  
  <!-- Savanna ground layers -->
  <ellipse cx="960" cy="850" rx="1200" ry="150" fill="#D68910" opacity="0.8"/>
  <ellipse cx="960" cy="900" rx="1300" ry="120" fill="#CA6F1E" opacity="0.7"/>
  <ellipse cx="960" cy="950" rx="1400" ry="100" fill="#BA4A00" opacity="0.6"/>
  
  <!-- Acacia trees -->
  <g transform="translate(1400, 600)">
    <rect x="-12" y="0" width="24" height="180" fill="#8B4513"/>
    <ellipse cx="0" cy="-40" rx="180" ry="70" fill="#27AE60" opacity="0.85"/>
    <ellipse cx="-60" cy="-25" rx="120" ry="60" fill="#229954" opacity="0.8"/>
    <ellipse cx="60" cy="-30" rx="130" ry="65" fill="#229954" opacity="0.8"/>
  </g>
  
  <g transform="translate(400, 650)">
    <rect x="-10" y="0" width="20" height="150" fill="#8B4513"/>
    <ellipse cx="0" cy="-35" rx="150" ry="60" fill="#27AE60" opacity="0.85"/>
    <ellipse cx="-50" cy="-20" rx="100" ry="50" fill="#229954" opacity="0.8"/>
  </g>
  
  <!-- Giraffe silhouette -->
  <g transform="translate(600, 650)" opacity="0.75">
    <ellipse cx="0" cy="80" rx="50" ry="40" fill="#C17817"/>
    <rect x="-8" y="0" width="16" height="80" fill="#C17817"/>
    <ellipse cx="0" cy="-10" rx="35" ry="40" fill="#C17817"/>
    <rect x="-5" y="-50" width="10" height="40" fill="#C17817"/>
    <ellipse cx="0" cy="-60" rx="25" ry="20" fill="#C17817"/>
    <line x1="0" y1="-60" x2="-15" y2="-75" stroke="#9B6A1F" stroke-width="3"/>
  </g>
  
  <!-- Elephant silhouette -->
  <g transform="translate(900, 750)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="#5D6D7E"/>
    <ellipse cx="0" cy="-40" rx="60" ry="70" fill="#5D6D7E"/>
    <rect x="-60" y="0" width="15" height="80" fill="#5D6D7E"/>
    <rect x="-20" y="0" width="15" height="80" fill="#5D6D7E"/>
    <rect x="20" y="0" width="15" height="80" fill="#5D6D7E"/>
    <path d="M -30,-20 Q -50,10 -40,40" stroke="#5D6D7E" stroke-width="20" fill="none"/>
  </g>
  
  <!-- Grass patches -->
  <g opacity="0.6">
    <line x1="200" y1="880" x2="220" y2="850" stroke="#27AE60" stroke-width="3"/>
    <line x1="250" y1="890" x2="270" y2="860" stroke="#229954" stroke-width="3"/>
    <line x1="1500" y1="870" x2="1520" y2="840" stroke="#27AE60" stroke-width="3"/>
  </g>
</svg>