<t>
    <div>
        <t t-call="master_input"/>

        <div class="form-group cy-form_group">
            <label class="cy-modal__label" for="dbname">Database Name <span class="cy-required">*</span></label>
            <input type="text" class="form-control cy-input_control" id="dbname" name="name" required="required"
                   autocomplete="off" t-att-pattern="pattern"
                   title="Only alphanumerical characters, underscore, hyphen and dot are allowed"/>
        </div>

        <div class="form-group cy-form_group">
            <label class="cy-modal__label" for="login">Email <span class="cy-required">*</span></label>
            <input id="login" type="text" name="login" class="form-control cy-input_control" required="required"
                   autocomplete="off"/>
        </div>

        <div class="form-group cy-form_group">
            <label for="password" class="cy-modal__label">Password <span class="cy-required">*</span></label>
            <div class="cy-input-container">
                <div class="input-group">
                    <input id="password" type="password" name="password" class="form-control cy-input_control"
                           required="required" autocomplete="off"/>
                    <span class="cy-eye ri-eye-fill o_little_eye" aria-hidden="true" style="cursor: pointer;"></span>
                </div>
            </div>
        </div>


        <div class="form-group cy-form_group">
            <label class="cy-modal__label" for="phone">Phone Number</label>
            <input type="tel" class="form-control cy-input_control" id="phone" name="phone" autocomplete="off">
        </div>

        <div class="form-group cy-form_group">
            <label class="cy-modal__label" for="lang">Language<span class="cy-required">*</span></label>
            <select id="lang" name="lang" class="form-select cy-input_control" required="required" autocomplete="off">
                <t t-foreach="langs" t-as="lang">
                    <t t-if="lang[0] == 'en_US'">
                        <option t-att-value="lang[0]" t-out="lang[1]" selected="selected"/>
                    </t>
                    <t t-else="">
                        <option t-att-value="lang[0]" t-out="lang[1]"/>
                    </t>
                </t>
            </select>
        </div>

        <div class="form-group cy-form_group">
            <label class="cy-modal__label" for="country">Country</label>
            <select id="country" name="country_code" class="form-select cy-input_control" autocomplete="off">
                <option value=""></option>
                <t t-foreach="countries" t-as="country">
                    <option t-att-value="country[0]" t-out="country[1]"/>
                </t>
            </select>
        </div>

        <div class="form-check mb-2 ps-4">
            <input class="form-check-input cy-check_box" type="checkbox" id="load_demo_checkbox" name="demo" value="1">
            <label class="form-check-label cy-radio_label" for="load_demo_checkbox" style="margin-top: 0.25rem;">Demo
                data</label>
        </div>

    </div>
</t>
