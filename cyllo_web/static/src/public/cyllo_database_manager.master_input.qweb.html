<t>
    <t t-set="set_master_pwd" t-value="set_master_pwd or False" />
    <t t-set="input_class" t-value="'form-control'" />
    <t t-if="insecure">
        <t t-if="set_master_pwd">
            <input type="hidden" name="master_pwd" class="form-control" value="admin" />
        </t>
        <t t-else="">
            <div class="alert alert-warning">
                <p>Warning, your Cyllo database manager is not protected. To secure it, we have generated the following
                    master password for it:</p>
                <p style="text-align: center;"><strong class="generated_master_pwd"></strong></p>
                <p>You can change it below but be sure to remember it, it will be asked for future operations on
                    databases.</p>
            </div>
            <t t-set="input_class" t-value="'form-control generated_master_pwd_input'" />
        </t>
    </t>
    <t t-if="not insecure or not set_master_pwd">
        <div class="form-group">
            <label class="cy-modal__label" for="master_pwd">Master Password<sup class="cy-required">*</sup></label>
            <div class="input-group">
                <input t-attf-class="{{input_class}} form-control cy-input-box"
                   placeholder="Type your master password" type="password"
                   name="master_pwd" id="master_pwd"
                   autofocus="autofocus"  required="required" autocomplete="current-password"
                   />
                <span class="cy-eye ri-eye-fill o_little_eye mt-1" aria-hidden="true" style="cursor: pointer;"></span>
            </div>
        </div>
    </t>
</t>
