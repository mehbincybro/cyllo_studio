<t>
    <t t-set="set_master_pwd" t-value="set_master_pwd or False"/>
    <t t-set="input_class" t-value="'form-control'"/>
    <t t-if="insecure">
        <t t-if="set_master_pwd">
            <input type="hidden" name="master_pwd" class="form-control" value="admin"/>
        </t>
        <t t-else="">
            <div class="alert alert-warning">
                <p>Warning, your Odoo database manager is not protected. To secure it, we have generated the following
                    master password for it:</p>
                <p style="text-align: center;"><strong class="generated_master_pwd"></strong></p>
                <p>You can change it below but be sure to remember it, it will be asked for future operations on
                    databases.</p>
            </div>
            <t t-set="input_class" t-value="'form-control generated_master_pwd_input'"/>
        </t>
    </t>
    <t t-if="not insecure or not set_master_pwd">
        <div class="form-group cy-form_group">
            <label for="master_pwd" class="cy-modal__label">Master Password<span class="cy-required">*</span></label>
            <div class="cy-input-container">
                <div class="input-group">
                    <input id="master_pwd" type="password" t-attf-class="{{input_class}} cy-input_control"
                           autofocus="autofocus" name="master_pwd" required="required" autocomplete="current-password"/>
                    <span class="cy-eye ri-eye-fill o_little_eye" aria-hidden="true" style="cursor: pointer;"></span>
                </div>
            </div>
        </div>
    </t>
</t>
