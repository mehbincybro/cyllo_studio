<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 1050 1050">
  <defs>
    <style>
      .bg  { fill: #fff; }
      .c2  { fill: #b2b749; }
      .c3  { fill: #bbc14d; }
      .c4  { fill: #9ea700; }
      .c5  { fill: #cfd380; }
    </style>
    <clipPath id="calClip">
      <rect x="140" y="200" width="570" height="490" rx="52" ry="52"/>
    </clipPath>
    <clipPath id="tickClip">
      <circle cx="598" cy="598" r="148"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect class="bg" width="850" height="850" rx="72.61" ry="72.61"/>

  <!-- Ring pegs -->
  <rect class="c2" x="268" y="150" width="50" height="120" rx="25" ry="25"/>
  <rect class="c2" x="532" y="150" width="50" height="120" rx="25" ry="25"/>
  <rect class="c4" x="281" y="163" width="24" height="94" rx="12" ry="12"/>
  <rect class="c4" x="545" y="163" width="24" height="94" rx="12" ry="12"/>

  <!-- Calendar clipped to rounded rect -->
  <g clip-path="url(#calClip)">
    <rect class="c5" x="140" y="200" width="570" height="490"/>
    <rect class="c4" x="140" y="200" width="570" height="150"/>
    <rect class="c3" x="140" y="200" width="570" height="34"/>

    <rect class="c3" x="140" y="450" width="570" height="10"/>
    <rect class="c3" x="140" y="560" width="570" height="10"/>
    <rect class="c3" x="330" y="350" width="10" height="340"/>
    <rect class="c3" x="510" y="350" width="10" height="340"/>

    <circle class="c3" cx="235" cy="400" r="26"/>
    <circle class="c3" cx="425" cy="400" r="26"/>
    <circle class="c3" cx="615" cy="400" r="26"/>
    <circle class="c3" cx="235" cy="505" r="26"/>
    <circle class="c3" cx="425" cy="505" r="26"/>
    <circle class="c3" cx="615" cy="505" r="26"/>
    <circle class="c3" cx="235" cy="615" r="26"/>
    <circle class="c3" cx="425" cy="615" r="26"/>
    <circle class="c3" cx="615" cy="615" r="26"/>
  </g>

  <!-- Tick badge outer ring -->
  <circle class="c4" cx="598" cy="598" r="148"/>

  <!-- Tick badge inner + checkmark clipped -->
  <g clip-path="url(#tickClip)">
    <circle class="c3" cx="598" cy="598" r="148"/>
    <path fill="none" stroke="#9ea700" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"
          d="M528,600 L575,652 L682,538"/>
  </g>

</svg>
